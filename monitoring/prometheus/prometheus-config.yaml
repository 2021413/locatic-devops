apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: locatic
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    # Règles d'alerte montées depuis la ConfigMap prometheus-rules
    # (voir prometheus-rules.yaml et prometheus-deployment.yaml).
    rule_files:
      - /etc/prometheus/rules/*.yml

    # Les alertes qui passent en FIRING sont envoyées à Alertmanager.
    alerting:
      alertmanagers:
        - static_configs:
            - targets: ["alertmanager.locatic.svc.cluster.local:9093"]

    scrape_configs:
      # App et Nginx : découverte automatique via les annotations prometheus.io/*
      # posées sur les pods (voir k8s/base et helm/locatic/templates).
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ["locatic"]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace

      # État des pods/PVC (kube-state-metrics), déployé dans ce même PR.
      - job_name: kube-state-metrics
        static_configs:
          - targets: ["kube-state-metrics.locatic.svc.cluster.local:8080"]

      # Kubelet de chaque nœud : expose notamment kubelet_volume_stats_*
      # (occupation réelle des PVC), utilisé par l'alerte LocaticPvcAlmostFull
      # et le panel « Stockage » du dashboard Grafana.
      - job_name: kubernetes-nodes
        kubernetes_sd_configs:
          - role: node
        scheme: https
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        tls_config:
          # Démo locale (minikube) : le certificat du kubelet est auto-signé.
          insecure_skip_verify: true
        relabel_configs:
          - source_labels: [__meta_kubernetes_node_name]
            target_label: node
