apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: locatic
data:
  locatic-alerts.yml: |
    groups:
      - name: locatic
        rules:
          # App injoignable : plus aucune cible locatic-app découverte (absent),
          # ou cible découverte mais scrape en échec (up == 0).
          - alert: LocaticAppDown
            expr: absent(up{pod=~"locatic-app.*"}) or up{pod=~"locatic-app.*"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "L'application Locatic est injoignable"
              description: >-
                Aucune cible locatic-app n'est up depuis plus d'une minute
                (pod {{ $labels.pod }}). Vérifier le deployment locatic-app
                dans le namespace locatic.

          # Nginx injoignable : même logique que pour l'app, sur les pods locatic-nginx.
          - alert: LocaticNginxDown
            expr: absent(up{pod=~"locatic-nginx.*"}) or up{pod=~"locatic-nginx.*"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Le reverse proxy Nginx de Locatic est injoignable"
              description: >-
                Aucune cible locatic-nginx n'est up depuis plus d'une minute
                (pod {{ $labels.pod }}). Vérifier le deployment locatic-nginx
                dans le namespace locatic.

          # PVC SQLite presque plein : > 85 % utilisés pendant 5 minutes.
          # Les métriques kubelet_volume_stats_* viennent du kubelet (job kubernetes-nodes).
          - alert: LocaticPvcAlmostFull
            expr: >-
              kubelet_volume_stats_used_bytes{namespace="locatic", persistentvolumeclaim="locatic-sqlite-pvc"}
              /
              kubelet_volume_stats_capacity_bytes{namespace="locatic", persistentvolumeclaim="locatic-sqlite-pvc"}
              > 0.85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Le PVC SQLite de Locatic est presque plein (> 85 %)"
              description: >-
                Le PVC locatic-sqlite-pvc est utilisé à
                {{ $value | humanizePercentage }} depuis plus de 5 minutes.
                Nettoyer le volume ou augmenter sa taille.

          # La stack de monitoring elle-même : kube-state-metrics down = plus
          # d'état des pods/PVC dans Grafana ni pour les alertes.
          - alert: LocaticMonitoringTargetDown
            expr: absent(up{job="kube-state-metrics"}) or up{job="kube-state-metrics"} == 0
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "kube-state-metrics est injoignable"
              description: >-
                La cible kube-state-metrics n'est plus scrapée depuis plus
                d'une minute : l'état des pods et des PVC n'est plus remonté.
                Vérifier le deployment kube-state-metrics dans le namespace locatic.
