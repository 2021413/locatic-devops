apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: locatic
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: locatic
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
        app.kubernetes.io/part-of: locatic
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.55.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
          ports:
            - name: http
              containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: storage
              mountPath: /prometheus
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: storage
          # Stockage éphémère : suffisant pour la démo locale (pas de contrat de persistance
          # des métriques dans ce projet, contrairement à la base SQLite de l'app).
          emptyDir: {}
