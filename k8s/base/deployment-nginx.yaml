apiVersion: apps/v1
kind: Deployment
metadata:
  name: locatic-nginx
  labels:
    app.kubernetes.io/name: locatic-nginx
    app.kubernetes.io/part-of: locatic
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: locatic-nginx
  template:
    metadata:
      labels:
        app.kubernetes.io/name: locatic-nginx
        app.kubernetes.io/part-of: locatic
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
      volumes:
        - name: nginx-conf
          configMap:
            name: locatic-nginx-conf
