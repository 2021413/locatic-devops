{{- if .Values.nginx.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: locatic-nginx-conf
  labels:
    app.kubernetes.io/name: locatic-nginx
    app.kubernetes.io/part-of: locatic
data:
  nginx.conf: |
    events {}

    http {
      server {
        listen 80;

        location / {
          proxy_pass http://locatic-app;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }
      }

      {{- if .Values.nginx.exporter.enabled }}
      # Endpoint interne (loopback uniquement) scrappé par le sidecar nginx-prometheus-exporter.
      server {
        listen 127.0.0.1:8081;

        location /stub_status {
          stub_status;
          allow 127.0.0.1;
          deny all;
        }
      }
      {{- end }}
    }
{{- end }}
