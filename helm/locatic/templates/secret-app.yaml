{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secret.name }}
  labels:
    app.kubernetes.io/name: locatic-app
    app.kubernetes.io/part-of: locatic
type: Opaque
# Template versionné : les valeurs par défaut ne sont pas des secrets réels.
stringData:
  {{- toYaml .Values.secret.data | nindent 2 }}
{{- end }}
