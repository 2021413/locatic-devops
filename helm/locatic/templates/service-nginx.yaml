{{- if .Values.nginx.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: locatic-nginx
  labels:
    app.kubernetes.io/name: locatic-nginx
    app.kubernetes.io/part-of: locatic
spec:
  # Seul point d'entrée du système : l'app reste en ClusterIP (jamais exposée directement).
  type: {{ .Values.nginx.service.type }}
  selector:
    app.kubernetes.io/name: locatic-nginx
  ports:
    - name: http
      port: {{ .Values.nginx.service.port }}
      targetPort: http
      {{- if and (eq .Values.nginx.service.type "NodePort") .Values.nginx.service.nodePort }}
      nodePort: {{ .Values.nginx.service.nodePort }}
      {{- end }}
{{- end }}
