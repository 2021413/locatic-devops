{{- if .Values.nginx.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: locatic-nginx
  labels:
    app.kubernetes.io/name: locatic-nginx
    app.kubernetes.io/part-of: locatic
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: locatic-nginx
  template:
    metadata:
      labels:
        app.kubernetes.io/name: locatic-nginx
        app.kubernetes.io/part-of: locatic
    spec:
      containers:
        - name: nginx
          image: "{{ .Values.nginx.image.repository }}:{{ .Values.nginx.image.tag }}"
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          resources:
            {{- toYaml .Values.nginx.resources | nindent 12 }}
      volumes:
        - name: nginx-conf
          configMap:
            name: locatic-nginx-conf
{{- end }}
