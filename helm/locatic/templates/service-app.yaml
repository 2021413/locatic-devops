apiVersion: v1
kind: Service
metadata:
  name: locatic-app
  labels:
    app.kubernetes.io/name: locatic-app
    app.kubernetes.io/part-of: locatic
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: locatic-app
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
