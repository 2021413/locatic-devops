name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: build-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore app/Locatic.sln

      - name: Build
        run: dotnet build app/Locatic.sln --no-restore -c Release

      - name: Test
        run: dotnet test app/Locatic.sln --no-build -c Release --verbosity normal

      - name: Format check
        run: dotnet format app/Locatic.sln --verify-no-changes --no-restore

  docker-build:
    name: docker-build
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: app
          file: app/Dockerfile
          push: false
          load: true
          tags: locatic:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image artifact
        run: docker save locatic:ci -o /tmp/locatic.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: locatic-image
          path: /tmp/locatic.tar
          retention-days: 1

  scan:
    name: scan
    needs: docker-build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: locatic-image
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/locatic.tar

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: locatic:ci
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
