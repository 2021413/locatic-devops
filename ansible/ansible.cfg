# Configuration Ansible du projet Locatic (lot B).
# Tout s'exécute en local : Ansible orchestre terraform / helm / kubectl
# sur le poste qui héberge minikube.

[defaults]
inventory = inventory/hosts.yml
# Sortie lisible (résultats des tâches au format YAML).
stdout_callback = ansible.builtin.default
# Pas de SSH : inutile de vérifier des clés d'hôtes.
host_key_checking = False
# Masque les hôtes/tâches sans intérêt pour garder un run concis.
display_skipped_hosts = False
interpreter_python = auto_silent
# Pas de fichiers .retry parasites dans le dépôt.
retry_files_enabled = False

[callback_default]
result_format = yaml
